    // **[이중 안전 설계 (Dual-Safety Beaker System) 가동]**
    function triggerCountdownSequence() {
      try {
        // 즉시 스크린 교환으로 렉 0% 가동
        if (DOM.setupScreen) DOM.setupScreen.classList.remove('active');
        if (DOM.gameScreen) DOM.gameScreen.classList.remove('active');
        if (DOM.countdownScreen) DOM.countdownScreen.classList.add('active');

        DOM.countdownProgressBar.style.transition = 'none';
        DOM.countdownProgressBar.style.width = '0%';

        let remainCount = 5;
        DOM.countdownNumber.textContent = remainCount;
        DOM.countdownNumber.style.transform = 'scale(1.3)';
        setTimeout(() => {
          DOM.countdownNumber.style.transform = 'scale(1)';
        }, 150);

        SoundManager.playTick();

        setTimeout(() => {
          DOM.countdownProgressBar.style.transition = 'width 5s linear';
          DOM.countdownProgressBar.style.width = '100%';
        }, 50);

        state.leftFinished = false;
        state.rightFinished = false;
        state.leftClearTime = null;
        state.rightClearTime = null;
        state.mapReady = false; // 준비 플래그 리셋

        DOM.leftTeamSide.classList.remove('finished-wait');
        DOM.rightTeamSide.classList.remove('finished-wait');
        DOM.leftTeamTitle.textContent = "🔵 BLUE TEAM";
        DOM.rightTeamTitle.textContent = "🔴 RED TEAM";

        const root = document.documentElement;
        root.style.setProperty('--beaker-capacity', state.beakerCapacity);

        const filledCount = state.totalBeakersCount - state.emptyBeakersCount;
        if (DOM.leftTotal) DOM.leftTotal.textContent = filledCount;
        if (DOM.rightTotal) DOM.rightTotal.textContent = filledCount;

        // 비동기 병렬 연산 시작
        asyncGenerateMap((readyBeakers) => {
          state.initialBeakersBackup = JSON.parse(JSON.stringify(readyBeakers));
          state.leftBoard.beakers = JSON.parse(JSON.stringify(readyBeakers));
          state.rightBoard.beakers = JSON.parse(JSON.stringify(readyBeakers));

          checkCompletedBeakers('left');
          checkCompletedBeakers('right');
          updateProgressUI('left');
          updateProgressUI('right');

          state.mapReady = true; // 로드 완료 표시
        });

        // 1초 주기의 카운트다운 인터벌
        const countdownTimer = setInterval(() => {
          remainCount--;
          
          if (remainCount > 0) {
            DOM.countdownNumber.textContent = remainCount;
            DOM.countdownNumber.style.transform = 'scale(1.3)';
            setTimeout(() => {
              DOM.countdownNumber.style.transform = 'scale(1)';
            }, 120);

            SoundManager.playTick();
          } 
          else if (remainCount === 0) {
            DOM.countdownNumber.textContent = "시작! ⚔️";
            DOM.countdownNumber.style.transform = 'scale(1.4)';
            SoundManager.playPop();
          } 
          else {
            clearInterval(countdownTimer);
            
            if (DOM.countdownScreen) DOM.countdownScreen.classList.remove('active');
            if (DOM.gameScreen) DOM.gameScreen.classList.add('active');

            // [이중 안전장치]: 만약 카운트다운이 마감되었는데 아직 비동기 맵 로딩이 완료되지 않았다면,
            // 더 이상 대기하지 않고 동기식 폴백 알고리즘을 즉석에서 강제 시동하여 비커 채우기 완료!
            if (!state.mapReady || !state.leftBoard.beakers || state.leftBoard.beakers.length === 0) {
              console.warn("Safety trigger: Async load was incomplete. Forcing immediate sync map.");
              const themePool = EMOJI_THEMES[state.selectedTheme] || EMOJI_THEMES.mixed;
              const selectedEmojis = shuffleArray([...themePool]).slice(0, state.emojiTypesCount);
              const fallbackBeakers = generateSolvableBeakers(filledCount, state.emptyBeakersCount, state.beakerCapacity, selectedEmojis);
              
              state.initialBeakersBackup = JSON.parse(JSON.stringify(fallbackBeakers));
              state.leftBoard.beakers = JSON.parse(JSON.stringify(fallbackBeakers));
              state.rightBoard.beakers = JSON.parse(JSON.stringify(fallbackBeakers));

              checkCompletedBeakers('left');
              checkCompletedBeakers('right');
              updateProgressUI('left');
              updateProgressUI('right');
              
              state.mapReady = true;
            }

            // 렌더링 드로잉
            DOM.leftBeakerBoard.innerHTML = '';
            DOM.rightBeakerBoard.innerHTML = '';
            renderBeakers('left');
            renderBeakers('right');

            startTimer();
            startRenderLoop();
          }
        }, 1000);

      } catch (err) {
        console.error("Countdown sequence error:", err);
        showSetupScreen();
      }
    }

    // 비동기 맵 로더 (프레임당 청크 시도 횟수를 5회로 상향하여 맵 완성 속도 가속화)
    function asyncGenerateMap(onSuccess) {
      try {
        let attempts = 0;
        const maxAttempts = 100;
        const themePool = EMOJI_THEMES[state.selectedTheme] || EMOJI_THEMES.mixed;
        const filledCount = state.totalBeakersCount - state.emptyBeakersCount;
        const emptyCount = state.emptyBeakersCount;
        const capacity = state.beakerCapacity;
        const selectedEmojis = shuffleArray([...themePool]).slice(0, state.emojiTypesCount);

        const tick = () => {
          // 1프레임당 5회씩 병렬 시도하여 로딩 타임을 1/5 수준(0.05초)으로 압축!
          for (let chunk = 0; chunk < 5; chunk++) {
            attempts++;
            
            if (attempts > maxAttempts) {
              const fallback = generateSolvableBeakers(filledCount, emptyCount, capacity, selectedEmojis);
              onSuccess(fallback);
              return;
            }

            const emojiDistribution = [];
            for (let i = 0; i < filledCount; i++) {
              const emoji = selectedEmojis[i % selectedEmojis.length];
              for (let c = 0; c < capacity; c++) {
                emojiDistribution.push(emoji);
              }
            }
            shuffleArray(emojiDistribution);

            const candidateBeakers = [];
            for (let i = 0; i < filledCount; i++) {
              candidateBeakers.push(emojiDistribution.slice(i * capacity, (i + 1) * capacity));
            }
            for (let i = 0; i < emptyCount; i++) {
              candidateBeakers.push([]);
            }
            shuffleArray(candidateBeakers);

            if (state.totalBeakersCount <= 24) {
              if (solveWaterSort(candidateBeakers)) {
                onSuccess(candidateBeakers);
                return;
              }
            } else {
              onSuccess(candidateBeakers);
              return;
            }
          }

          requestAnimationFrame(tick);
        };

        requestAnimationFrame(tick);
      } catch (e) {
        console.error("asyncGenerateMap error:", e);
        onSuccess(generateSolvableBeakers(
          state.totalBeakersCount - state.emptyBeakersCount,
          state.emptyBeakersCount,
          state.beakerCapacity,
          shuffleArray([...(EMOJI_THEMES[state.selectedTheme] || EMOJI_THEMES.mixed)]).slice(0, state.emojiTypesCount)
        ));
      }
    }

    function resetSideBoard(side) {
      try {
        if (side === 'left' && state.leftFinished) return;
        if (side === 'right' && state.rightFinished) return;

        SoundManager.playReset();
        const boardData = side === 'left' ? state.leftBoard : state.rightBoard;
        
        boardData.beakers = JSON.parse(JSON.stringify(state.initialBeakersBackup));
        boardData.completed.clear();
        
        renderBeakers(side);
        checkCompletedBeakers(side);
        updateProgressUI(side);
      } catch (err) {
        console.error("Error in resetSideBoard:", err);
      }
    }

    function showSetupScreen() {
      stopTimer();
      stopRenderLoop();
      state.isGameRunning = false;
      if (DOM.gameScreen) DOM.gameScreen.classList.remove('active');
      if (DOM.countdownScreen) DOM.countdownScreen.classList.remove('active');
      if (DOM.setupScreen) DOM.setupScreen.classList.add('active');
    }

    function generateSolvableBeakers(filledCount, emptyCount, capacity, selectedEmojis) {
      const emojiDistribution = [];
      for (let i = 0; i < filledCount; i++) {
        const emoji = selectedEmojis[i % selectedEmojis.length];
        for (let c = 0; c < capacity; c++) {
          emojiDistribution.push(emoji);
        }
      }
      shuffleArray(emojiDistribution);

      const beakers = [];
      for (let i = 0; i < filledCount; i++) {
        beakers.push(emojiDistribution.slice(i * capacity, (i + 1) * capacity));
      }
      for (let i = 0; i < emptyCount; i++) {
        beakers.push([]);
      }

      shuffleArray(beakers);

      return beakers;
    }

    function initGameData() {
      try {
        state.leftBoard.completed.clear();
        state.rightBoard.completed.clear();
        state.activeDragPointers.clear();
        if (DOM.dragContainer) DOM.dragContainer.innerHTML = '';
        
        const themePool = EMOJI_THEMES[state.selectedTheme] || EMOJI_THEMES.mixed;
        const filledCount = state.totalBeakersCount - state.emptyBeakersCount;
        const emptyCount = state.emptyBeakersCount;
        const capacity = state.beakerCapacity;

        let finalBeakers = [];
        let attempts = 0;
        const maxAttempts = 100;

        const selectedEmojis = shuffleArray([...themePool]).slice(0, state.emojiTypesCount);

        while (attempts < maxAttempts) {
          attempts++;

          const emojiDistribution = [];
          for (let i = 0; i < filledCount; i++) {
            const emoji = selectedEmojis[i % selectedEmojis.length];
            for (let c = 0; c < capacity; c++) {
              emojiDistribution.push(emoji);
            }
          }

          shuffleArray(emojiDistribution);

          const candidateBeakers = [];
          for (let i = 0; i < filledCount; i++) {
            candidateBeakers.push(emojiDistribution.slice(i * capacity, (i + 1) * capacity));
          }

          for (let i = 0; i < emptyCount; i++) {
            candidateBeakers.push([]);
          }

          shuffleArray(candidateBeakers);

          if (state.totalBeakersCount <= 24) {
            if (solveWaterSort(candidateBeakers)) {
              finalBeakers = candidateBeakers;
              break;
            }
          } else {
            finalBeakers = candidateBeakers;
            break;
          }
        }

        if (finalBeakers.length === 0) {
          finalBeakers = generateSolvableBeakers(filledCount, emptyCount, capacity, selectedEmojis);
        }

        state.initialBeakersBackup = JSON.parse(JSON.stringify(finalBeakers));

        state.leftBoard.beakers = JSON.parse(JSON.stringify(finalBeakers));
        state.rightBoard.beakers = JSON.parse(JSON.stringify(finalBeakers));

        checkCompletedBeakers('left');
        checkCompletedBeakers('right');
        updateProgressUI('left');
        updateProgressUI('right');
      } catch (err) {
        console.error("Error in initGameData:", err);
      }
    }

    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    // 7. 보드 렌더링 및 캐싱
    function renderBeakers(side) {
      try {
        const boardEl = side === 'left' ? DOM.leftBeakerBoard : DOM.rightBeakerBoard;
        if (!boardEl) return;

        const boardData = side === 'left' ? state.leftBoard : state.rightBoard;
        const totalBeakers = boardData.beakers.length;
        let cols = Math.min(12, totalBeakers);

        boardEl.style.gridTemplateColumns = `repeat(${cols}, var(--beaker-width))`;
        adjustBeakerSizeForSide(totalBeakers, cols);

        const beakerEls = boardEl.querySelectorAll('.beaker');

        if (beakerEls.length === totalBeakers) {
          boardData.beakers.forEach((beaker, index) => {
            const beakerEl = beakerEls[index];
            
            if (beaker.length > 0) {
              beakerEl.classList.add('filled');
            } else {
              beakerEl.classList.remove('filled');
            }

            if (boardData.completed.has(index)) {
              beakerEl.classList.add('completed');
            } else {
              beakerEl.classList.remove('completed');
            }

            const existingSlots = beakerEl.querySelectorAll('.emoji-slot');
            const newSize = beaker.length;

            existingSlots.forEach((slotEl, slotIdx) => {
              if (slotIdx < newSize) {
                slotEl.textContent = beaker[slotIdx];
                slotEl.style.opacity = '1';
                slotEl.classList.remove('dragging-out');
              } else {
                slotEl.textContent = '';
                slotEl.style.opacity = '0';
                slotEl.classList.remove('dragging-out');
              }
            });
          });
        } else {
          boardEl.innerHTML = '';
          boardData.beakers.forEach((beaker, index) => {
            const beakerEl = document.createElement('div');
            beakerEl.className = 'beaker';
            beakerEl.dataset.index = index;
            
            if (beaker.length > 0) {
              beakerEl.classList.add('filled');
            }
            
            if (boardData.completed.has(index)) {
              beakerEl.classList.add('completed');
            }

            for (let slotIdx = 0; slotIdx < state.beakerCapacity; slotIdx++) {
              const slotEl = document.createElement('div');
              slotEl.className = 'emoji-slot';
              if (slotIdx < beaker.length) {
                slotEl.textContent = beaker[slotIdx];
              } else {
                slotEl.textContent = '';
                slotEl.style.opacity = '0';
              }
              slotEl.dataset.slotIndex = slotIdx;
              beakerEl.appendChild(slotEl);
            }

            boardEl.appendChild(beakerEl);
          });
        }

        cacheBeakerRegions(side);
      } catch (err) {
        console.error("Error in renderBeakers:", err);
      }
    }

    function adjustBeakerSizeForSide(totalBeakers, cols) {
      const root = document.documentElement;
      
      const boardEl = DOM.leftBeakerBoard || document.getElementById('left-beaker-board');
      const boardHeight = (boardEl && boardEl.clientHeight > 100)
        ? boardEl.clientHeight - 8
        : window.innerHeight - 130;

      const boardWidth = (window.innerWidth / 2) - 30;

      let beakerWidth = Math.floor(boardWidth / cols) - 10;
      beakerWidth = Math.max(46, Math.min(64, beakerWidth)); 
      
      const rows = Math.ceil(totalBeakers / cols);
      let beakerHeight = Math.floor(boardHeight / rows) - 12; 
      beakerHeight = Math.max(70, Math.min(195, beakerHeight)); 

      const emojiSize = Math.max(16, Math.min(36, Math.floor(beakerWidth * 0.72)));

      root.style.setProperty('--beaker-width', `${beakerWidth}px`);
      root.style.setProperty('--beaker-height', `${beakerHeight}px`);
      root.style.setProperty('--emoji-size', `${emojiSize}px`);
    }

    function cacheBeakerRegions(side) {
      const boardEl = side === 'left' ? DOM.leftBeakerBoard : DOM.rightBeakerBoard;
      const boardData = side === 'left' ? state.leftBoard : state.rightBoard;
      if (!boardEl) return;

      boardData.regions = [];
      const beakerEls = boardEl.querySelectorAll('.beaker');
      beakerEls.forEach(el => {
        const rect = el.getBoundingClientRect();
        boardData.regions.push({
          index: parseInt(el.dataset.index, 10),
          left: rect.left,
          right: rect.right,
          top: rect.top,
          bottom: rect.bottom,
          element: el
        });
      });
    }

    window.addEventListener('resize', () => {
      if (state.isGameRunning) {
        const totalBeakers = state.totalBeakersCount;
        let cols = Math.min(12, totalBeakers);
        adjustBeakerSizeForSide(totalBeakers, cols);
        setTimeout(() => {
          cacheBeakerRegions('left');
          cacheBeakerRegions('right');
        }, 200);
      }
    });

    // 8. 조작 격리 포인터 무설치 드래그 연출
    function onPointerDown(e, side) {
      if (!state.isGameRunning) return;

      if (side === 'left' && state.leftFinished) return;
      if (side === 'right' && state.rightFinished) return;

      const beakerEl = e.target.closest('.beaker');
      if (!beakerEl) return;

      const beakerIndex = parseInt(beakerEl.dataset.index, 10);
      const boardData = side === 'left' ? state.leftBoard : state.rightBoard;
      const beaker = boardData.beakers[beakerIndex];

      if (beaker.length === 0) return;
      if (boardData.completed.has(beakerIndex)) return;

      for (let [pid, info] of state.activeDragPointers) {
        if (info.boardSide === side && info.sourceBeakerIndex === beakerIndex) return;
      }

      e.preventDefault();
      
      cacheBeakerRegions(side);

      const topEmoji = beaker[beaker.length - 1];
      const dragEmojis = [];
      
      while (beaker.length > 0 && beaker[beaker.length - 1] === topEmoji) {
        dragEmojis.push(beaker.pop());
      }

      SoundManager.playPop();

      const children = beakerEl.querySelectorAll('.emoji-slot');
      const startIdx = beaker.length;
      const popCount = dragEmojis.length;
      for (let i = 0; i < popCount; i++) {
        const idx = startIdx + i;
        if (children[idx]) {
          children[idx].classList.add('dragging-out');
        }
      }

      const dragEl = document.createElement('div');
      dragEl.className = 'drag-emoji';
      
      dragEmojis.forEach(emoji => {
        const emojiNode = document.createElement('div');
        emojiNode.className = 'drag-emoji-node';
        emojiNode.textContent = emoji;
        dragEl.appendChild(emojiNode);
      });

      if (DOM.dragContainer) DOM.dragContainer.appendChild(dragEl);

      const startX = e.clientX;
      const startY = e.clientY;
      dragEl.style.transform = `translate3d(${startX}px, ${startY}px, 0) translate(-50%, -50%) scale(1.1)`;

      state.activeDragPointers.set(e.pointerId, {
        boardSide: side,
        sourceBeakerIndex: beakerIndex,
        emojis: dragEmojis,
        dragElement: dragEl,
        currentX: startX,
        currentY: startY,
        beakerElement: beakerEl,
        hoveredIndex: -1
      });
    }

    function onPointerMove(e) {
      const dragInfo = state.activeDragPointers.get(e.pointerId);
      if (!dragInfo) return;

      dragInfo.currentX = e.clientX;
      dragInfo.currentY = e.clientY;
    }

    function onPointerUp(e) {
      const dragInfo = state.activeDragPointers.get(e.pointerId);
      if (!dragInfo) return;

      const side = dragInfo.boardSide;
      const boardData = side === 'left' ? state.leftBoard : state.rightBoard;

      const dropX = dragInfo.currentX;
      const dropY = dragInfo.currentY;
      let targetIndex = -1;
      let targetBeakerEl = null;

      for (let region of boardData.regions) {
        if (dropX >= region.left && dropX <= region.right && dropY >= region.top && dropY <= region.bottom) {
          targetIndex = region.index;
          targetBeakerEl = region.element;
          break;
        }
      }

      if (!targetBeakerEl) {
        const fallbackTarget = document.elementFromPoint(dropX, dropY);
        const beakerCandidate = fallbackTarget ? fallbackTarget.closest('.beaker') : null;
        if (beakerCandidate) {
          const boardBoard = beakerCandidate.closest('.beaker-board');
          const candidateSide = boardBoard ? boardBoard.dataset.side : null;
          if (candidateSide === side) {
            targetIndex = parseInt(beakerCandidate.dataset.index, 10);
            targetBeakerEl = beakerCandidate;
          }
        }
      }

      const sideSelector = side === 'left' ? '.left-side' : '.right-side';
      document.querySelectorAll(`${sideSelector} .beaker.hovered`).forEach(el => el.classList.remove('hovered'));

      let moveSuccess = false;

      if (targetBeakerEl && targetIndex !== dragInfo.sourceBeakerIndex) {
        if (isValidMove(side, dragInfo.sourceBeakerIndex, targetIndex, dragInfo.emojis)) {
          moveSuccess = true;
        }
      }

      if (moveSuccess) {
        const targetBeaker = boardData.beakers[targetIndex];
        dragInfo.emojis.forEach(emoji => targetBeaker.push(emoji));

        SoundManager.playDrop();

        checkCompletedBeakers(side);
        renderBeakers(side);
        updateProgressUI(side);
        checkWinCondition(side);

        const rect = targetBeakerEl.getBoundingClientRect();
        const destX = rect.left + rect.width / 2;
        const destY = rect.top + rect.height / 2;

        animateDragElementTo(dragInfo.dragElement, destX, destY, () => {
          dragInfo.dragElement.remove();
        });
      } else {
        SoundManager.playFail();

        const sourceBeaker = boardData.beakers[dragInfo.sourceBeakerIndex];
        dragInfo.emojis.forEach(emoji => sourceBeaker.push(emoji));

        renderBeakers(side);

        const rect = dragInfo.beakerElement.getBoundingClientRect();
        const destX = rect.left + rect.width / 2;
        const destY = rect.top + rect.height / 2;

        animateDragElementTo(dragInfo.dragElement, destX, destY, () => {
          dragInfo.dragElement.remove();
        });
      }

      state.activeDragPointers.delete(e.pointerId);
    }

    function onPointerCancel(e) {
      const dragInfo = state.activeDragPointers.get(e.pointerId);
      if (!dragInfo) return;

      const side = dragInfo.boardSide;
      const boardData = side === 'left' ? state.leftBoard : state.rightBoard;

      const sourceBeaker = boardData.beakers[dragInfo.sourceBeakerIndex];
      dragInfo.emojis.forEach(emoji => sourceBeaker.push(emoji));
      dragInfo.dragElement.remove();
      
      renderBeakers(side);
      state.activeDragPointers.delete(e.pointerId);
    }

    function startRenderLoop() {
      stopRenderLoop();
      
      const tick = () => {
        if (!state.isGameRunning) return;
        
        for (let [pid, dragInfo] of state.activeDragPointers) {
          const el = dragInfo.dragElement;
          const x = dragInfo.currentX;
          const y = dragInfo.currentY;
          const side = dragInfo.boardSide;
          const boardData = side === 'left' ? state.leftBoard : state.rightBoard;
          
          el.style.transform = `translate3d(${x}px, ${y}px, 0) translate(-50%, -50%) scale(1.1)`;
          
          let currentHoverIndex = -1;
          for (let region of boardData.regions) {
            if (x >= region.left && x <= region.right && y >= region.top && y <= region.bottom) {
              currentHoverIndex = region.index;
              break;
            }
          }
          
          if (currentHoverIndex !== dragInfo.hoveredIndex) {
            if (dragInfo.hoveredIndex !== -1) {
              const prevRegion = boardData.regions.find(r => r.index === dragInfo.hoveredIndex);
              if (prevRegion) prevRegion.element.classList.remove('hovered');
            }
            
            if (currentHoverIndex !== -1 && currentHoverIndex !== dragInfo.sourceBeakerIndex && !boardData.completed.has(currentHoverIndex)) {
              const curRegion = boardData.regions.find(r => r.index === currentHoverIndex);
              if (curRegion) curRegion.element.classList.add('hovered');
              dragInfo.hoveredIndex = currentHoverIndex;
            } else {
              dragInfo.hoveredIndex = -1;
            }
          }
        }
        
        state.animFrameId = requestAnimationFrame(tick);
      };
      
      state.animFrameId = requestAnimationFrame(tick);
    }

    function stopRenderLoop() {
      if (state.animFrameId) {
        cancelAnimationFrame(state.animFrameId);
        state.animFrameId = null;
      }
    }

    function animateDragElementTo(el, destX, destY, callback) {
      el.style.transition = 'transform 0.22s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.22s ease';
      el.style.transform = `translate3d(${destX}px, ${destY}px, 0) translate(-50%, -50%) scale(0.5)`;
      el.style.opacity = '0.2';
      
      setTimeout(callback, 220);
    }

    // 9. 워터소트 배틀킹 룰 및 완료 검사
    function isValidMove(side, srcIdx, destIdx, emojiList) {
      const boardData = side === 'left' ? state.leftBoard : state.rightBoard;
      
      if (boardData.completed.has(destIdx)) return false;

      const dest = boardData.beakers[destIdx];
      const capacity = state.beakerCapacity;
      
      const moveCount = emojiList.length;
      const currentDestCount = dest.length;

      if (currentDestCount + moveCount > capacity) {
        return false;
      }

      if (currentDestCount === 0) {
        return true;
      }

      const destTopEmoji = dest[currentDestCount - 1];
      const dragEmojiType = emojiList[0];

      return destTopEmoji === dragEmojiType;
    }

    function checkCompletedBeakers(side) {
      const boardData = side === 'left' ? state.leftBoard : state.rightBoard;
      boardData.completed.clear();
      
      boardData.beakers.forEach((beaker, index) => {
        if (beaker.length === state.beakerCapacity) {
          const firstEmoji = beaker[0];
          const isAllSame = beaker.every(emoji => emoji === firstEmoji);
          if (isAllSame) {
            boardData.completed.add(index);
          }
        }
      });
    }

    function updateProgressUI(side) {
      const completedEl = side === 'left' ? DOM.leftCompleted : DOM.rightCompleted;
      const boardData = side === 'left' ? state.leftBoard : state.rightBoard;
      if (completedEl) completedEl.textContent = boardData.completed.size;
    }

    // 10. 타이머 엔진
    function startTimer() {
      stopTimer();
      state.elapsedMs = 0;
      state.startTime = performance.now();
      state.isGameRunning = true;
      
      const hasTimeLimit = state.timeLimit !== 'infinite';
      const limitMs = hasTimeLimit ? parseInt(state.timeLimit, 10) * 1000 : 0;
      
      if (DOM.timerLabel) {
        DOM.timerLabel.textContent = hasTimeLimit ? '⏱️ 남은 시간' : '⏱️ 진행 시간';
      }

      state.timerInterval = setInterval(() => {
        const now = performance.now();
        if (hasTimeLimit) {
          const remainingMs = limitMs - (now - state.startTime);
          state.elapsedMs = limitMs - remainingMs;
          
          if (remainingMs <= 0) {
            DOM.timer.textContent = '00:00.00';
            handleTimeOver();
          } else {
            DOM.timer.textContent = formatTime(remainingMs);
          }
        } else {
          state.elapsedMs = now - state.startTime;
          DOM.timer.textContent = formatTime(state.elapsedMs);
        }
      }, 33);
    }

    function stopTimer() {
      if (state.timerInterval) {
        clearInterval(state.timerInterval);
        state.timerInterval = null;
      }
    }

    function formatTime(ms) {
      if (ms < 0) ms = 0;
      let minutes = Math.floor(ms / 60000);
      let seconds = Math.floor((ms % 60000) / 1000);
      let centiseconds = Math.floor((ms % 1000) / 10);
      
      return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}.${String(centiseconds).padStart(2, '0')}`;
    }

    // 11. 승패 판정 및 대기 규칙 적용
    function checkWinCondition(side) {
      const boardData = side === 'left' ? state.leftBoard : state.rightBoard;
      const filledCount = state.totalBeakersCount - state.emptyBeakersCount;
      const isWon = boardData.completed.size === filledCount;
      
      if (isWon) {
        if (side === 'left' && !state.leftFinished) {
          state.leftFinished = true;
          state.leftClearTime = state.elapsedMs;
          SoundManager.playComplete();
          DOM.leftTeamSide.classList.add('finished-wait');
          DOM.leftTeamTitle.textContent = "🔵 BLUE TEAM (완료! 대기중)";
        } else if (side === 'right' && !state.rightFinished) {
          state.rightFinished = true;
          state.rightClearTime = state.elapsedMs;
          SoundManager.playComplete();
          DOM.rightTeamSide.classList.add('finished-wait');
          DOM.rightTeamTitle.textContent = "🔴 RED TEAM (완료! 대기중)";
        }

        const isTimeMode = state.timeLimit !== 'infinite';

        if (isTimeMode) {
          if (state.leftFinished && state.rightFinished) {
            stopTimer();
            stopRenderLoop();
            state.isGameRunning = false;
            SoundManager.playWin();
            setTimeout(() => showBattleResult(), 600);
          }
        } else {
          if (state.leftFinished && state.rightFinished) {
            stopTimer();
            stopRenderLoop();
            state.isGameRunning = false;
            SoundManager.playWin();
            setTimeout(() => showBattleResult(), 600);
          }
        }
      }
    }

    function handleTimeOver() {
      stopTimer();
      stopRenderLoop();
      state.isGameRunning = false;
      state.activeDragPointers.clear();
      
      SoundManager.playWin();
      setTimeout(() => showBattleResult(true), 600);
    }

    function showBattleResult(isTimeOver = false) {
      if (!DOM.winTeamTitle) return;

      const leftBeakersCompleted = state.leftBoard.completed.size;
      const rightBeakersCompleted = state.rightBoard.completed.size;
      
      let winner = 'draw';
      let summaryText = "";

      if (state.leftFinished && state.rightFinished) {
        if (state.leftClearTime < state.rightClearTime) {
          winner = 'left';
          summaryText = `두 팀 모두 완성! 블루 팀이 더 빠름! (${formatTime(state.leftClearTime)} vs ${formatTime(state.rightClearTime)})`;
        } else if (state.leftClearTime > state.rightClearTime) {
          winner = 'right';
          summaryText = `두 팀 모두 완성! 레드 팀이 더 빠름! (${formatTime(state.leftClearTime)} vs ${formatTime(state.rightClearTime)})`;
        } else {
          winner = 'draw';
          summaryText = `두 팀 모두 완벽하게 동시에 완성! (${formatTime(state.leftClearTime)})`;
        }
      } 
      else if (state.leftFinished && !state.rightFinished) {
        winner = 'left';
        summaryText = `블루 팀 단독 완성 성공! (${formatTime(state.leftClearTime)}) (레드 팀 ${rightBeakersCompleted}개 완료)`;
      } 
      else if (!state.leftFinished && state.rightFinished) {
        winner = 'right';
        summaryText = `레드 팀 단독 완성 성공! (${formatTime(state.rightClearTime)}) (블루 팀 ${leftBeakersCompleted}개 완료)`;
      } 
      else {
        if (leftBeakersCompleted > rightBeakersCompleted) {
          winner = 'left';
          summaryText = `시간 초과! 블루 팀이 더 많이 완성함! (블루 ${leftBeakersCompleted}개 vs 레드 ${rightBeakersCompleted}개)`;
        } else if (leftBeakersCompleted < rightBeakersCompleted) {
          winner = 'right';
          summaryText = `시간 초과! 레드 팀이 더 많이 완성함! (블루 ${leftBeakersCompleted}개 vs 레드 ${rightBeakersCompleted}개)`;
        } else {
          winner = 'draw';
          summaryText = `시간 초과! 동점 기록으로 무승부! (각 ${leftBeakersCompleted}개 완성)`;
        }
      }

      if (winner === 'left') {
        DOM.winTeamTitle.textContent = '🔵 BLUE TEAM 승리!';
        DOM.winTeamTitle.style.color = 'var(--blue-team)';
      } else if (winner === 'right') {
        DOM.winTeamTitle.textContent = '🔴 RED TEAM 승리!';
        DOM.winTeamTitle.style.color = 'var(--red-team)';
      } else {
        DOM.winTeamTitle.textContent = '🤝 무승부!';
        DOM.winTeamTitle.style.color = 'var(--text-main)';
      }
      
      if (DOM.winTimeDesc) {
        DOM.winTimeDesc.innerHTML = summaryText;
      }
      
      if (DOM.finalTime) {
        DOM.finalTime.textContent = formatTime(state.elapsedMs);
      }
      
      if (DOM.winModal) DOM.winModal.classList.add('active');
    }

    function closeWinModal() {
      if (DOM.winModal) DOM.winModal.classList.remove('active');
    }
  </script>

    var SUPPORTED = ['ko','en','zh','ja','es','fr','de','it','pt-br','ru','hi','bn','id','vi','th','tr'];
    var STORAGE_KEY = 'kingsmath_lang';
    var currentLang = 'en';

    function getLang(code){ for (var i=0;i<languages.length;i++){ if(languages[i].code===code) return languages[i]; } return null; }

    // 브라우저/파라미터 코드 → 지원 코드 정규화
    function normalizeLang(raw){
      if(!raw) return null;
      raw = String(raw).toLowerCase().replace('_','-');
      if(raw === 'pt-br' || raw.indexOf('pt') === 0) return 'pt-br';
      if(raw.indexOf('zh') === 0) return 'zh';
      if(SUPPORTED.indexOf(raw) !== -1) return raw;
      var base = raw.split('-')[0];
      if(SUPPORTED.indexOf(base) !== -1) return base;
      return null;
    }

    // 우선순위: URL > localStorage > navigator > en
    function detectLang(){
      try {
        var fromUrl = normalizeLang(new URLSearchParams(window.location.search).get('lang'));
        if(fromUrl) return fromUrl;
      } catch(e){}
      try {
        var stored = normalizeLang(localStorage.getItem(STORAGE_KEY));
        if(stored) return stored;
      } catch(e){}
      try {
        var navs = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language];
        for(var i=0;i<navs.length;i++){ var n = normalizeLang(navs[i]); if(n) return n; }
      } catch(e){}
      return 'en';
    }

    // 긴 번역이 버튼을 벗어나지 않도록 폰트 크기 동적 축소 (모달/게임 CSS와 무관, 인라인 스타일만)
    function fitText(el, minPx){
      if(!el) return;
      el.style.fontSize = '';
      var size = parseFloat(getComputedStyle(el).fontSize) || 14;
      var prevWs = el.style.whiteSpace;
      el.style.whiteSpace = 'nowrap';
      var guard = 0;
      while(el.scrollWidth > el.clientWidth + 1 && size > minPx && guard < 60){
        size -= 0.5; el.style.fontSize = size + 'px'; guard++;
      }
      el.style.whiteSpace = prevWs;
    }

    function setText(sel, val){ var el = document.querySelector(sel); if(el && val != null) el.textContent = val; }

    function applyI18n(lang){
      var t = T[lang] || T.en;

      // 설정 화면
      setText('.setup-header h1', t.title);
      setText('.setup-header p', t.subtitle);

      var diffGrid = document.getElementById('difficulty-options');
      if(diffGrid){ var dh = diffGrid.closest('.setting-section').querySelector('h3'); if(dh) dh.textContent = t.diff_label; }
      var diffMap = { easy:t.diff_easy, normal:t.diff_normal, hard:t.diff_hard, veryhard:t.diff_veryhard, insane:t.diff_insane, impossible:t.diff_impossible };
      Object.keys(diffMap).forEach(function(k){ var b = document.querySelector('#difficulty-options .option-btn[data-value="'+k+'"]'); if(b) b.textContent = diffMap[k]; });

      var detGrid = document.querySelector('.compact-controls-grid');
      if(detGrid){ var deh = detGrid.closest('.setting-section').querySelector('h3'); if(deh) deh.textContent = t.detail_label; }
      var labels = document.querySelectorAll('.control-label');
      if(labels[0]) labels[0].textContent = t.ctrl_total;
      if(labels[1]) labels[1].textContent = t.ctrl_empty;
      if(labels[2]) labels[2].textContent = t.ctrl_emoji;

      var timeGrid = document.getElementById('time-options');
      if(timeGrid){ var th3 = timeGrid.closest('.setting-section').querySelector('h3'); if(th3) th3.textContent = t.time_label; }
      var timeMap = { '60':t.time_1, '120':t.time_2, '180':t.time_3, '240':t.time_4, '300':t.time_5, 'infinite':t.time_inf };
      Object.keys(timeMap).forEach(function(k){ var b = document.querySelector('#time-options .option-btn[data-value="'+k+'"]'); if(b) b.textContent = timeMap[k]; });

      var themeWrap = document.querySelector('.theme-options');
      if(themeWrap){ var thh = themeWrap.closest('.setting-section').querySelector('h3'); if(thh) thh.textContent = t.theme_label; }
      var themeMap = { mixed:t.theme_mixed, animals:t.theme_animals, fruits:t.theme_fruits, foods:t.theme_foods, activities:t.theme_activities };
      Object.keys(themeMap).forEach(function(k){ var b = document.querySelector('.theme-btn[data-theme="'+k+'"]'); if(b) b.textContent = themeMap[k]; });

      setText('#start-btn', t.start_btn);
      setText('#other-game-btn', t.other_game);

      // 카운트다운 / 게임 화면 정적 텍스트
      setText('#countdown-screen h2', t.cd_ready);
      setText('#countdown-screen > div > p', t.cd_go);
      setText('#back-btn', t.back_btn);
      if(!document.fullscreenElement) setText('#timer-label', t.timer_run);
      var fsb = document.getElementById('fullscreen-btn');
      if(fsb && !document.fullscreenElement) fsb.textContent = t.fullscreen;
      setText('#left-team-title', t.blue_team);
      setText('#right-team-title', t.red_team);
      var cls = document.querySelectorAll('.km-completed-label');
      for(var i=0;i<cls.length;i++) cls[i].textContent = t.completed;
      setText('#reset-left-btn', t.reset_left);
      setText('#reset-right-btn', t.reset_right);
      setText('#modal-replay-btn', t.modal_replay);
      setText('#modal-setup-btn', t.modal_setup);

      // 모달 자체 텍스트
      var si = document.getElementById('kmSearchInput'); if(si) si.placeholder = t.search_ph;
      var nr = document.querySelector('#kmNoResult p'); if(nr) nr.textContent = t.no_result;

      // 폰트 자동 맞춤 (넘칠 때만 축소)
      ['#start-btn','#other-game-btn','#reset-left-btn','#reset-right-btn','#back-btn','#fullscreen-btn','#modal-replay-btn','#modal-setup-btn'].forEach(function(s){ fitText(document.querySelector(s), 9); });
    }

    function applySEO(lang){
      var t = T[lang] || T.en;
      document.title = t.seo_title || t.title;
      setMeta('description', t.seo_desc);
      setMeta('keywords', t.seo_keywords);
    }
    function setMeta(name, content){
      if(content == null) return;
      var m = document.querySelector('meta[name="'+name+'"]');
      if(!m){ m = document.createElement('meta'); m.setAttribute('name', name); document.head.appendChild(m); }
      m.setAttribute('content', content);
    }

    function setLanguage(code, opts){
      opts = opts || {};
      if(!T[code]) code = 'en';
      currentLang = code;

      applyI18n(code);
      applySEO(code);

      var htmlLang = (code === 'pt-br') ? 'pt-BR' : (code === 'zh' ? 'zh-CN' : code);
      document.documentElement.setAttribute('lang', htmlLang);

      if(opts.save !== false){ try { localStorage.setItem(STORAGE_KEY, code); } catch(e){} }

      if(opts.url !== false){
        try {
          var url = new URL(window.location.href);
          url.searchParams.set('lang', code);
          if(opts.replace) history.replaceState({ kmLang: code }, '', url.toString());
          else history.pushState({ kmLang: code }, '', url.toString());
        } catch(e){}
      }

      // 트리거 버튼 갱신
      var L = getLang(code);
      if(L){
        var f = document.getElementById('kmCurrentFlag'); if(f) f.src = 'https://flagcdn.com/w40/'+L.country+'.png';
        var n = document.getElementById('kmCurrentName'); if(n) n.textContent = L.name;
      }

      var si = document.getElementById('kmSearchInput');
      renderLanguages(si ? si.value : '');
    }

    // [요구8] 모달 목록 렌더 함수
    function renderLanguages(filterText){
      var grid = document.getElementById('kmLangGrid');
      var noRes = document.getElementById('kmNoResult');
      if(!grid) return;
      var f = (filterText || '').toLowerCase();
      grid.innerHTML = '';

      var list = languages.filter(function(l){
        return l.name.toLowerCase().indexOf(f) !== -1 ||
               l.enName.toLowerCase().indexOf(f) !== -1 ||
               l.code.toLowerCase().indexOf(f) !== -1;
      });

      if(list.length === 0){
        grid.style.display = 'none';
        if(noRes) noRes.classList.add('km-show');
        return;
      }
      grid.style.display = 'grid';
      if(noRes) noRes.classList.remove('km-show');

      list.forEach(function(l){
        var selected = (l.code === currentLang);
        var item = document.createElement('div');
        item.className = 'km-lang-item' + (selected ? ' km-selected' : '');
        item.innerHTML =
          '<div class="km-item-flag"><img src="https://flagcdn.com/w40/'+l.country+'.png" alt="'+l.country+'"></div>' +
          '<div class="km-item-txt"><span class="km-item-name">'+l.name+'</span><span class="km-item-sub">'+l.enName+'</span></div>' +
          (selected ? '<i class="fa-solid fa-circle-check km-check"></i>' : '');
        item.addEventListener('click', function(){ selectLanguage(l); });
        grid.appendChild(item);
      });
    }

    // [요구9] 언어 선택 시 반드시 모달 닫기
    function selectLanguage(lang){
      setLanguage(lang.code, {});   // save + url pushState
      closeModal();                 // 모달 닫힘 보장
      showToast(lang);
    }

    var modal = null, toastTimeout = null;
    function openModal(){
      modal = modal || document.getElementById('langModal');
      if(!modal) return;
      modal.classList.add('km-active');
      modal.setAttribute('aria-hidden', 'false');
      var si = document.getElementById('kmSearchInput');
      if(si){ si.value=''; renderLanguages(''); setTimeout(function(){ si.focus(); }, 120); }
    }
    function closeModal(){
      modal = modal || document.getElementById('langModal');
      if(!modal) return;
      modal.classList.remove('km-active');
      modal.setAttribute('aria-hidden', 'true');
    }

    function showToast(lang){
      var toast = document.getElementById('kmToast');
      if(!toast) return;
      var t = T[lang.code] || T.en;
      var msgEl = document.getElementById('kmToastMsg');
      var subEl = document.getElementById('kmToastLang');
      if(msgEl) msgEl.textContent = t.toast;
      if(subEl) subEl.textContent = lang.name;
      toast.classList.add('km-show');
      clearTimeout(toastTimeout);
      toastTimeout = setTimeout(function(){ toast.classList.remove('km-show'); }, 3000);
    }

    // 언어 선택기는 첫(설정) 화면에서만 노출, 게임/카운트다운 화면에서는 숨김
    function updateTriggerVisibility(){
      var setup = document.getElementById('setup-screen');
      var trigger = document.getElementById('kmLangTrigger');
      if(!trigger) return;
      var show = !!(setup && setup.classList.contains('active'));
      trigger.style.display = show ? 'block' : 'none';
      if(!show) closeModal();
    }

    function init(){
      // [요구8] 초기 목록 렌더링
      renderLanguages();

      // 이벤트 바인딩
      var btn = document.getElementById('kmLangBtn');
      var closeBtn = document.getElementById('kmCloseBtn');
      var search = document.getElementById('kmSearchInput');
      modal = document.getElementById('langModal');

      if(btn) btn.addEventListener('click', openModal);
      if(closeBtn) closeBtn.addEventListener('click', closeModal);
      if(modal) modal.addEventListener('click', function(e){ if(e.target === modal) closeModal(); });
      document.addEventListener('keydown', function(e){
        if(e.key === 'Escape' && modal && modal.classList.contains('km-active')) closeModal();
      });
      if(search) search.addEventListener('input', function(e){ renderLanguages(e.target.value); });

      // 화면 전환 감지 → 트리거 노출 제어
      ['setup-screen','countdown-screen','game-screen'].forEach(function(id){
        var el = document.getElementById(id);
        if(el){ new MutationObserver(updateTriggerVisibility).observe(el, { attributes:true, attributeFilter:['class'] }); }
      });
      updateTriggerVisibility();

      // 뒤로/앞으로 가기 시 URL 언어 반영
      window.addEventListener('popstate', function(){
        var p = null;
        try { p = new URLSearchParams(window.location.search).get('lang'); } catch(e){}
        var l = normalizeLang(p) || currentLang;
        setLanguage(l, { url:false });
      });

      // 초기 언어 적용 (기기 언어 감지 시 저장은 하지 않고, URL만 반영)
      var initial = detectLang();
      setLanguage(initial, { save:false, replace:true });
    }

    // 전역 노출 (요구4의 홈 로직 등에서 재사용 가능하도록)
    window.KMI18n = { setLanguage: setLanguage, renderLanguages: renderLanguages, openModal: openModal, closeModal: closeModal };

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
    else init();
  })();
  </script>
</body>
</html>
